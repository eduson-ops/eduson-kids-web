    <!-- WebGL2 проверка до загрузки React. При отсутствии — показывается fallback вместо пустого экрана. -->
    <script type="text/javascript">
      (function() {
        try {
          var c = document.createElement('canvas');
          var gl = c.getContext('webgl2');
          if (!gl) {
            document.documentElement.setAttribute('data-no-webgl2', 'true');
          }
        } catch (e) {
          document.documentElement.setAttribute('data-no-webgl2', 'true');
        }
      })();
    </script>

    <!-- SPA redirect decoder для GitHub Pages. Парный к public/404.html. -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
