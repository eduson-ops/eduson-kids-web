    <!-- WebGL2 проверка до загрузки React. При отсутствии — показывается fallback вместо пустого экрана. -->
    <script type="text/javascript">
      (function() {
        try {
          var c = document.createElement('canvas');
          var gl = c.getContext('webgl2');
          if (!gl) {
            document.documentElement.setAttribute('data-no-webgl2', 'true');
          }
        } catch (e) {
          document.documentElement.setAttribute('data-no-webgl2', 'true');
        }
      })();
    </script>

    <!-- SPA redirect decoder для GitHub Pages. Парный к public/404.html. -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>

    <style>
      /* Fallback-экран для браузеров без WebGL2 (показывается до рендера React) */
      html[data-no-webgl2] #root { display: none; }

        position: fixed; inset: 0;
        background: linear-gradient(245deg, #975118 0%, #7E192F 33%, #400355 69%, #0C0533 100%);

      }
      html[data-no-webgl2]::after {

      }
    </style>
