name: Bootstrap — Build & Push Image

on:
  workflow_dispatch:

env:
  REGISTRY: cr.yandex
  IMAGE_NAME: ${{ secrets.YC_CR_ID }}/eduson-api

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to YC Container Registry
        uses: docker/login-action@v3
        with:
          registry: cr.yandex
          username: json_key
          password: ${{ secrets.YC_SA_KEY }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:bootstrap
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Print image URL
        run: |
          echo "::notice::Image: cr.yandex/${{ secrets.YC_CR_ID }}/eduson-api:bootstrap"
          echo "Use in terraform.tfvars: api_image = \"cr.yandex/${{ secrets.YC_CR_ID }}/eduson-api:bootstrap\""
