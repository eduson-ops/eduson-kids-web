<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="#0C0533"/>
  <!-- Soft radial glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#6B5CE7" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#6B5CE7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0C0533" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="face-top" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#8A7BFF"/>
      <stop offset="100%" stop-color="#6B5CE7"/>
    </linearGradient>
    <linearGradient id="face-right" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#5B4CD6"/>
      <stop offset="100%" stop-color="#3E2FB8"/>
    </linearGradient>
    <linearGradient id="face-left" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#3A2DA8"/>
      <stop offset="100%" stop-color="#251D7A"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="180" fill="url(#glow)"/>

  <!-- Isometric cube, centered -->
  <g transform="translate(512,512) scale(1.8) translate(-176,-176)">
    <!-- top -->
    <path d="M176 0 L352 88 L176 176 L0 88 Z" fill="url(#face-top)"/>
    <!-- right -->
    <path d="M176 176 L352 88 L352 264 L176 352 Z" fill="url(#face-right)"/>
    <!-- left -->
    <path d="M176 176 L0 88 L0 264 L176 352 Z" fill="url(#face-left)"/>
    <!-- play triangle on the front-right face -->
    <path d="M210 150 L300 198 L210 244 Z" fill="#FFE066"/>
  </g>

  <!-- small sparkle dots -->
  <circle cx="260" cy="260" r="8" fill="#FFE066"/>
  <circle cx="780" cy="320" r="6" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="760" cy="760" r="10" fill="#FFE066" opacity="0.85"/>
  <circle cx="280" cy="760" r="5" fill="#FFFFFF" opacity="0.7"/>
</svg>
