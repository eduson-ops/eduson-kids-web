<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Загружаю…</title>
  <script type="text/javascript">
    // SPA redirect для GitHub Pages. Сохраняет запрошенный путь в query,
    // index.html потом его раскодирует и отдаёт React Router-у.
    // Подробнее: https://github.com/rafgraph/spa-github-pages
    var pathSegmentsToKeep = 1; // /<repo>/ — один сегмент держим как base.
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  <p style="font-family: system-ui, sans-serif; text-align: center; margin-top: 20vh;">Загружаю…</p>
</body>
</html>
